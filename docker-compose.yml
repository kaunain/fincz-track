services:
  postgres:
    image: postgres:15-alpine
    container_name: fincz-track-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fincz_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fincz_password}
      POSTGRES_DB: ${POSTGRES_DB:-fincz_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - fincz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fincz_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: fincz-track-adminer
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:8080"
    networks:
      - fincz-network
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local

networks:
  fincz-network:
    driver: bridge
