server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        - id: user-service
          uri: ${USER_SERVICE_URL:http://user-service:8082}
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1

        - id: portfolio-service
          uri: ${PORTFOLIO_SERVICE_URL:http://portfolio-service:8083}
          predicates:
            - Path=/api/portfolio/**
          filters:
            - StripPrefix=1

        - id: market-data-service
          uri: ${MARKET_SERVICE_URL:http://market-data-service:8084}
          predicates:
            - Path=/api/market/**
          filters:
            - StripPrefix=1

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://notification-service:8085}
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}