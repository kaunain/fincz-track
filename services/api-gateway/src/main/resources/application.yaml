server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1

        - id: portfolio-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/portfolio/**
          filters:
            - StripPrefix=1

        - id: market-data-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/market/**
          filters:
            - StripPrefix=1

        - id: notification-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1

jwt:
  secret: ${JWT_SECRET:yzEGd1mDkZZWObvq4vm3EIW4k1cpNM71ZFP8AcLg/zg=}
  expiration: ${JWT_EXPIRATION:3600000}