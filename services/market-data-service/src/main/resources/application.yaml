server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: market-data-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 5
      connection-timeout: ${DB_CONNECTION_TIMEOUT:20000}
      idle-timeout: ${DB_MAX_IDLE_TIME:600000}
  jpa:
    hibernate:
      ddl-auto: ${JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  cache:
    type: simple

# External API configurations
market:
  api:
    base-url: ${MARKET_API_BASE_URL:https://api.example.com}
    stock-base-url: ${MARKET_API_BASE_URL:https://www.alphavantage.co}
    mf-base-url: ${MARKET_API_MF_BASE_URL:https://api.mfapi.in}
    key: ${MARKET_API_KEY}
    refresh-interval-hours: ${MARKET_REFRESH_INTERVAL_HOURS:24}
    google-sheet-url: ${MARKET_GOOGLE_SHEET_URL:}
  schedule:
    refresh-cron: ${MARKET_REFRESH_CRON:0 0 1 * * *}

# Cache configuration
cache:
  ttl: ${CACHE_TTL:300000}