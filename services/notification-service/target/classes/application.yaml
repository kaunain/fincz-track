server:
  port: 8085

spring:
  application:
    name: notification-service
  datasource:
    url: ${DB_URL:jdbc:h2:mem:notificationdb;DB_CLOSE_DELAY=-1}
    username: ${DB_USER:sa}
    password: ${DB_PASS:}
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME:demo@fincz.com}
    password: ${EMAIL_PASSWORD:demo_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000

# Notification settings
notification:
  tax:
    reminder:
      days: 30  # Days before tax deadline to send reminder
  portfolio:
    alert:
      threshold: 5.0  # Percentage change to trigger alert